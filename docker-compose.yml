services:
  # ─────────────────────────────────────────────────────────────
  # Backend – Express.js API
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpp_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost
    expose:
      - "5000"
    networks:
      - vpp_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 40s

  # ─────────────────────────────────────────────────────────────
  # Frontend Builder – build React → đổ dist vào named volume
  # Container này chạy một lần rồi thoát (init container)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: vpp_frontend_builder
    restart: "no"                        # chạy một lần, không restart
    entrypoint: ["sh", "-c", "cp -rf /dist/. /app/html/ && echo '[frontend] dist copied'"]
    volumes:
      - frontend_dist:/app/html          # copy dist vào shared volume
    networks:
      - vpp_net

  # ─────────────────────────────────────────────────────────────
  # Nginx – Reverse Proxy + CORS Bypass + Serve SPA
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vpp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro   # nginx config mount trực tiếp
      - frontend_dist:/usr/share/nginx/html:ro               # dist từ frontend builder
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    networks:
      - vpp_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vpp_net:
    driver: bridge
    name: vpp_network

volumes:
  frontend_dist:
    name: vpp_frontend_dist

# ─────────────────────────────────────────────────────────────
# Luồng khởi động:
#   1. backend  → khởi Express, đợi /api/health healthy
#   2. frontend → build React, copy /dist → volume, exit(0)
#   3. nginx    → khởi sau khi (1) healthy + (2) xong
#                 - mount config  : ./nginx/app.conf
#                 - mount dist    : volume vpp_frontend_dist
#                 - /api/*        : proxy → backend:5000 (có CORS bypass)
#                 - /             : serve SPA index.html
#
# Chạy lần đầu:  docker compose up -d --build
# Rebuild:        docker compose up -d --build --force-recreate
# Xem logs:       docker compose logs -f nginx
# ─────────────────────────────────────────────────────────────
