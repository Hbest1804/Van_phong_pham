services:
  # ─────────────────────────────────────────────────────────────
  # Backend – Express.js API
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpp_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env            # chứa SUPABASE_URL, JWT secrets, v.v.
    environment:
      NODE_ENV: production
      PORT: 5000
      # Frontend URL qua Nginx (dùng cho CORS trong Express – để dự phòng)
      FRONTEND_URL: http://localhost
    expose:
      - "5000"                    # chỉ expose nội bộ, Nginx mới proxy vào
    networks:
      - vpp_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────────────────
  # Frontend – React + Nginx (với CORS bypass proxy)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API URL mà React dùng ở client-side (chạy qua Nginx proxy)
        VITE_API_URL: /api/v1
    container_name: vpp_frontend
    restart: unless-stopped
    ports:
      - "80:80"                   # Public port
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vpp_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vpp_net:
    driver: bridge
    name: vpp_network

# ─────────────────────────────────────────────────────────────
# Notes:
#   - Nginx (:80) nhận request từ browser
#   - /api/* được proxy sang backend:5000 (nội bộ Docker network)
#   - CORS header do Nginx xử lý hoàn toàn (bypass backend CORS)
#   - Không cần expose backend ra internet
#   - Để chạy: docker compose up --build -d
# ─────────────────────────────────────────────────────────────
