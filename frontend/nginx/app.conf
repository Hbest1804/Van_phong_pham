# ─────────────────────────────────────────────────────────────────────────────
# Nginx – Reverse Proxy + CORS Bypass
# Sơ đồ: Browser → Nginx(:80) → [Frontend SPA | /api/* → Backend(:5000)]
# ─────────────────────────────────────────────────────────────────────────────

# ── Helper map: xác định allowed origin ──────────────────────────────────────
map $http_origin $allow_origin {
    default                      "";
    "~^http://localhost(:[0-9]+)?$"   $http_origin;
    "~^https://localhost(:[0-9]+)?$"  $http_origin;
    # Thêm domain production của bạn vào đây, ví dụ:
    # "~^https://vanphongpham\.com$"  $http_origin;
}

# ── Rate limit zone (chặn spam) ───────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # ── Charset & Compression ─────────────────────────────────────────────────
    charset utf-8;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"         always;
    add_header X-XSS-Protection          "1; mode=block"      always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Health check endpoint (dùng cho Docker HEALTHCHECK) ───────────────────
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── API Proxy → Backend (Express) ─────────────────────────────────────────
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=60 nodelay;

        # ── CORS Headers (bypass hoàn toàn) ───────────────────────────────────
        # Với request preflight (OPTIONS) – trả ngay, không forward lên backend
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $allow_origin always;
            add_header Access-Control-Allow-Credentials "true"        always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Cookie" always;
            add_header Access-Control-Max-Age           86400         always;
            add_header Content-Length 0;
            return 204;
        }

        # Với các method khác – thêm header rồi forward
        add_header Access-Control-Allow-Origin      $allow_origin always;
        add_header Access-Control-Allow-Credentials "true"        always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, Cookie" always;
        add_header Access-Control-Expose-Headers    "Set-Cookie"  always;

        # Ẩn CORS header gốc từ backend (tránh duplicate)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # Proxy settings
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cookie / Credential forwarding
        proxy_pass_header  Set-Cookie;
        proxy_cookie_path  / /;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # ── Frontend SPA (React) ──────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Cache tĩnh assets (js/css/img)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # SPA fallback – mọi route về index.html
        try_files $uri $uri/ /index.html;
    }

    # ── Client error pages ────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
